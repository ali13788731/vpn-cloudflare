<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد آمار کلودفلر</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #2a2a40;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #f39c12;
        }
        .stat {
            font-size: 20px;
            margin: 15px 0;
        }
        .number-requests {
            color: #3498db;
            font-weight: bold;
            font-size: 28px;
        }
        .number-errors {
            color: #e74c3c;
            font-weight: bold;
            font-size: 28px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>📊 آمار امروز ورکر</h1>
        
        <div class="stat">
            تعداد درخواست‌ها (Today): <br>
            <span class="number-requests" id="req-val">درحال دریافت...</span>
        </div>
        
        <div class="stat">
            تعداد خطاها (Today): <br>
            <span class="number-errors" id="err-val">درحال دریافت...</span>
        </div>

        <div class="footer">
            آخرین بروزرسانی: <br>
            <span id="time-val">...</span>
        </div>
    </div>

    <script>
        // 🔴 لینک ورکری که در مرحله اول ساختید را اینجا جایگزین کنید
        const API_URL = "https://cf-stats-api.your-name.workers.dev";

        async function fetchStats() {
            try {
                // پارامتر t برای جلوگیری از کش شدن مرورگر اضافه شده است
                const response = await fetch(API_URL + "?t=" + new Date().getTime());
                const result = await response.json();
                
                const invocations = result.data.viewer.accounts[0].workersInvocationsAdaptive;
                let reqCount = 0;
                let errCount = 0;
                
                if(invocations && invocations.length > 0) {
                    reqCount = invocations[0].sum.requests;
                    errCount = invocations[0].sum.errors;
                }
                
                // بروزرسانی مقادیر در صفحه
                document.getElementById("req-val").innerText = reqCount.toLocaleString();
                document.getElementById("err-val").innerText = errCount.toLocaleString();
                
                // بروزرسانی زمان
                const now = new Date();
                const timeString = now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
                document.getElementById("time-val").innerText = timeString;

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById("time-val").innerText = "خطا در دریافت اطلاعات!";
            }
        }

        // ۱. دریافت اطلاعات در لحظه‌ی باز شدن صفحه
        fetchStats();
        
        // ۲. آپدیت خودکار اطلاعات هر ۵ ثانیه (۵۰۰۰ میلی‌ثانیه)
        setInterval(fetchStats, 5000);
    </script>

</body>
</html>

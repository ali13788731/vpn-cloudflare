
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد آمار کلودفلر</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #2a2a40;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #f39c12;
        }
        .stat {
            font-size: 20px;
            margin: 15px 0;
        }
        .number-requests {
            color: #3498db;
            font-weight: bold;
            font-size: 28px;
        }
        .number-errors {
            color: #e74c3c;
            font-weight: bold;
            font-size: 28px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>📊 آمار امروز ورکر</h1>
        
        <div class="stat">
            تعداد درخواست‌ها (Today): <br>
            <span class="number-requests">21,017</span>
        </div>
        
        <div class="stat">
            تعداد خطاها (Today): <br>
            <span class="number-errors">6,564</span>
        </div>

        <div class="footer">
            آخرین بروزرسانی: <br>
            2026-07-23 12:58:11 UTC
        </div>
    </div>

</body>
</html>

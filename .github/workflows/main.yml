name: CF HTML Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  repository_dispatch:
    types: [trigger-cron]
  workflow_dispatch:

# دسترسی‌های لازم برای آپدیت Pages
permissions:
  contents: write
  pages: write
  id-token: write

# همزمانی برای جلوگیری از تداخل اجراها
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run Monitor
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: python update_usage.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Live stats updated"
          git push

      # مرحله جدید: آماده‌سازی فایل‌ها برای صفحات گیت‌هاب
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # پوشه‌ای که index.html در آن قرار دارد

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

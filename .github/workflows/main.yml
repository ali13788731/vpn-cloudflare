name: CF HTML Monitor

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای داخلی گیت‌هاب (هر ۱۰ دقیقه - با احتمال کمی تاخیر)
  repository_dispatch:
    types: [trigger-cron] # برای شلیک دقیق ۱۰ دقیقه‌ای از سایت‌های واسط
  workflow_dispatch: # اجرای دستی

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run Monitor
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: python update_usage.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Live stats updated"
          git push
